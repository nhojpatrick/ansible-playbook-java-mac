---
- hosts: localhost
  vars:
    jdk_major: "15"
    jdk_minor: "ea" # leave as ea
    jdk_build: "36"

  tasks:

    - name: Override - JDK 15 >= 35
      set_fact:
        jdk_minor: "rc"
      when:
        - jdk_major == "15"
        - jdk_build|int >= 35

    - name: Include Vars
      include_vars:
        file: vars.yaml

    - name: Override - JDK 15 build 36
      set_fact:
        jdk_url: "https://download.java.net/java/GA/jdk15/779bf45e88a44cbd9ea6621d33e33db1/36/GPL/openjdk-15_osx-x64_bin.tar.gz"
      when:
        - jdk_major == "15"
        - jdk_minor == "rc"
        - jdk_build == "36"

    - name: Checking if jdk already installed
      stat:
        path: "{{ jvm_home }}/{{ java_dir_name }}"
      register: java_home

    - name: Fail if jdk already installed
      fail:
        msg: "Already installed {{ jvm_home }}/{{ java_dir_name }}"
      when: java_home.stat.exists

    - name: Temporary jdk directory
      tempfile:
        state: directory
        suffix: jdk
      register: jdk_tmp

    - name: "Install jdk"
      block:

        - name: Download jdk
          get_url:
            url: "{{ jdk_url }}"
            dest: "{{ jdk_tmp.path }}/{{ jdk_file }}"

        - name: Unarchive jdk
          unarchive:
            src: "{{ jdk_tmp.path }}/{{ jdk_file }}"
            dest: "{{ jdk_tmp.path }}/"

        - name: Relocate jdk
          become: True
          copy:
            src: "{{ jdk_tmp.path }}/{{ jdk_archive_subdir }}/"
            dest:  "{{ jvm_home }}/{{ java_dir_name }}"
            remote_src: yes
            owner: "{{ java_owner }}"
            group: "{{ java_group }}"

        - name: Secure jdk
          become: True
          file:
            path: "{{ jvm_home }}/{{ java_dir_name }}"
            state: directory
            recurse: yes
            owner: "{{ java_owner }}"
            group: "{{ java_group }}"

      always:

        - name: Clean up temporary jdk directory
          file:
            path: "{{ jdk_tmp.path }}"
            state: absent
          when: jdk_tmp.path is defined
